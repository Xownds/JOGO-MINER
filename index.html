<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miner Empire</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
padding-bottom:80px;
}

header{
background:#171717;
padding:20px;
text-align:center;
box-shadow:0 0 20px rgba(255,170,0,.3);
}

h1{
color:#ffb300;
}

.top{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
font-weight:bold;
}

.xpBar{
height:18px;
background:#333;
border-radius:50px;
overflow:hidden;
margin-top:15px;
}

.xpFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff9800,#ffd54f);
transition:.3s;
}

.tabs{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:#171717;
}

.tabs button{
flex:1;
border:none;
background:none;
color:white;
padding:15px;
font-size:14px;
}

.tab{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:#1b1b1b;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(255,170,0,.08);
}

.mineBtn{
width:220px;
height:220px;
border-radius:50%;
border:none;
font-size:28px;
font-weight:bold;
background:linear-gradient(135deg,#ff9800,#ffd54f);
margin:auto;
display:block;
margin-top:20px;
color:black;
}

.mineBtn:active{
transform:scale(.95);
}

.list{
display:flex;
flex-direction:column;
gap:10px;
}

.item{
background:#242424;
padding:12px;
border-radius:12px;
}

.buyBtn{
background:#ff9800;
border:none;
padding:8px 15px;
border-radius:10px;
font-weight:bold;
margin-top:8px;
}

.equip{
background:#4caf50;
}

.float{
position:fixed;
font-weight:bold;
animation:float 1s forwards linear;
pointer-events:none;
z-index:999;
}

@keyframes float{
from{
opacity:1;
transform:translateY(0);
}
to{
opacity:0;
transform:translateY(-80px);
}
}
</style>
</head>
<body>

<header>

<h1>⛏ Miner Empire</h1>

<div class="top">
<div>💰 <span id="coins">0</span></div>
<div>⭐ Nv <span id="level">1</span></div>
</div>

<div class="xpBar">
<div class="xpFill" id="xpFill"></div>
</div>

<div style="margin-top:8px">
<span id="xp">0</span> /
<span id="nextXp">100</span> XP
</div>

</header>

<div id="mine" class="tab active">

<div class="card">

<h2>Pedreira</h2>

<button class="mineBtn" onclick="mine()">
⛏
</button>

<p style="margin-top:15px">
Último minério:
<b id="lastOre">Nenhum</b>
</p>

<p style="margin-top:10px">
Picareta:
<b id="currentPickaxe">Madeira</b>
</p>

</div>

</div>

<div id="inventory" class="tab">

<div class="card">

<h2>Inventário</h2>

<div id="inventoryList" class="list"></div>

<button class="buyBtn" onclick="sellAll()">
Vender Tudo
</button>

</div>

</div>

<div id="shop" class="tab">

<div class="card">

<h2>Picaretas</h2>

<div id="pickaxeList"></div>

</div>

</div>

<div id="stats" class="tab">

<div class="card">

<h2>Estatísticas</h2>

<p>Total de minerações: <span id="statMined">0</span></p>
<br>
<p>Total XP: <span id="statXp">0</span></p>
<br>
<p>Total moedas: <span id="statCoins">0</span></p>

</div>

</div>

<div class="tabs">
<button onclick="showTab('mine')">⛏</button>
<button onclick="showTab('inventory')">🎒</button>
<button onclick="showTab('shop')">🛒</button>
<button onclick="showTab('stats')">📊</button>
</div>

<script>

const ores = [

{name:"Carvão",value:5,xp:5},
{name:"Cobre",value:10,xp:8},
{name:"Ferro",value:20,xp:12},
{name:"Prata",value:50,xp:20},
{name:"Ouro",value:100,xp:30}

];

const pickaxes = [

{
name:"Madeira",
price:0,
bonus:1
},

{
name:"Pedra",
price:500,
bonus:2
},

{
name:"Ferro",
price:2500,
bonus:4
}

];

let game = {

coins:0,

level:1,

xp:0,

nextXp:100,

pickaxe:"Madeira",

ownedPickaxes:["Madeira"],

inventory:{},

stats:{
mined:0,
xp:0,
coins:0
}

};

load();

function mine(){

let ore =
ores[Math.floor(Math.random()*ores.length)];

let bonus =
pickaxes.find(
p=>p.name===game.pickaxe
).bonus;

let coinsGain =
ore.value*bonus;

let xpGain =
ore.xp*bonus;

if(!game.inventory[ore.name]){
game.inventory[ore.name]=0;
}

game.inventory[ore.name]++;

game.coins+=coinsGain;
game.xp+=xpGain;

game.stats.mined++;
game.stats.xp+=xpGain;
game.stats.coins+=coinsGain;

document.getElementById(
"lastOre"
).innerText=ore.name;

floatText(
"+"+coinsGain+" 💰"
);

levelCheck();

update();

}

function levelCheck(){

while(game.xp>=game.nextXp){

game.xp-=game.nextXp;

game.level++;

game.nextXp=
Math.floor(
game.nextXp*1.25
);

floatText(
"LEVEL UP!"
);

}

}

function sellAll(){

let total=0;

for(let oreName in game.inventory){

let oreData =
ores.find(
o=>o.name===oreName
);

total +=
oreData.value *
game.inventory[oreName];

}

game.coins+=total;

game.inventory={};

floatText(
"+"+total+" venda"
);

update();

}

function buyPickaxe(name){

let pickaxe=
pickaxes.find(
p=>p.name===name
);

if(
game.ownedPickaxes.includes(name)
){

game.pickaxe=name;

update();

return;

}

if(game.coins<pickaxe.price){

alert(
"Moedas insuficientes"
);

return;

}

game.coins-=pickaxe.price;

game.ownedPickaxes.push(name);

game.pickaxe=name;

update();

}

function renderShop(){

let html="";

pickaxes.forEach(p=>{

let owned=
game.ownedPickaxes.includes(
p.name
);

html+=`

<div class="item">

<b>${p.name}</b>

<br>

Bônus: x${p.bonus}

<br>

Preço: ${p.price}

<br>

<button
class="buyBtn ${owned?'equip':''}"
onclick="buyPickaxe('${p.name}')"
>

${owned?'Equipar':'Comprar'}

</button>

</div>

`;

});

document.getElementById(
"pickaxeList"
).innerHTML=html;

}

function renderInventory(){

let box=
document.getElementById(
"inventoryList"
);

box.innerHTML="";

for(let ore in game.inventory){

box.innerHTML+=`

<div class="item">

${ore}

<br>

Quantidade:
${game.inventory[ore]}

</div>

`;

}

if(box.innerHTML===""){

box.innerHTML=
"<div class='item'>Inventário vazio</div>";

}

}

function floatText(text){

let div=
document.createElement("div");

div.className="float";

div.innerText=text;

div.style.left=
(35+Math.random()*30)+"%";

div.style.top="50%";

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},1000);

}

function showTab(id){

document
.querySelectorAll(".tab")
.forEach(t=>{

t.classList.remove(
"active"
);

});

document
.getElementById(id)
.classList.add(
"active"
);

}

function update(){

document.getElementById(
"coins"
).innerText=
Math.floor(game.coins);

document.getElementById(
"level"
).innerText=
game.level;

document.getElementById(
"xp"
).innerText=
Math.floor(game.xp);

document.getElementById(
"nextXp"
).innerText=
game.nextXp;

document.getElementById(
"currentPickaxe"
).innerText=
game.pickaxe;

document.getElementById(
"xpFill"
).style.width=
(game.xp/game.nextXp*100)+"%";

document.getElementById(
"statMined"
).innerText=
game.stats.mined;

document.getElementById(
"statXp"
).innerText=
Math.floor(game.stats.xp);

document.getElementById(
"statCoins"
).innerText=
Math.floor(game.stats.coins);

renderInventory();
renderShop();

save();

}

function save(){

localStorage.setItem(
"minerEmpireSave",
JSON.stringify(game)
);

}

function load(){

let saveData=
localStorage.getItem(
"minerEmpireSave"
);

if(saveData){

game=
JSON.parse(saveData);

}

}

setInterval(
save,
5000
);

update();

</script>

</body>
</html>
