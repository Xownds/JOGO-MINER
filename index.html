<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Miner Empire V1</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
touch-action:none;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#111;
}

canvas{
display:block;
background:#2c5e2e;
}

#hud{
position:fixed;
top:10px;
left:10px;
right:10px;
background:rgba(0,0,0,.7);
padding:10px;
border-radius:12px;
color:white;
z-index:10;
}

#xpBar{
width:100%;
height:16px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-top:6px;
}

#xpFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff9800,#ffd54f);
}

#mineBtn{
position:fixed;
right:20px;
bottom:30px;
width:100px;
height:100px;
border:none;
border-radius:50%;
background:#ff9800;
font-size:18px;
font-weight:bold;
color:black;
z-index:20;
}

#mineBtn:active{
transform:scale(.95);
}

#joystick{
position:fixed;
left:20px;
bottom:20px;
width:140px;
height:140px;
background:rgba(255,255,255,.15);
border-radius:50%;
z-index:20;
}

#stick{
position:absolute;
width:60px;
height:60px;
left:35px;
top:35px;
border-radius:50%;
background:white;
}

.float{
position:fixed;
color:gold;
font-weight:bold;
pointer-events:none;
animation:float 1s linear forwards;
z-index:100;
}

@keyframes float{
from{
opacity:1;
transform:translateY(0);
}
to{
opacity:0;
transform:translateY(-60px);
}
}
</style>
</head>
<body>

<div id="hud">
<div>Nível <span id="level">1</span></div>
<div>XP <span id="xp">0</span>/<span id="nextXp">100</span></div>
<div id="ores">
⚫ 0 | ⚙ 0 | 🟡 0
</div>
<div id="xpBar">
<div id="xpFill"></div>
</div>
</div>

<canvas id="game"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="mineBtn">MINERAR</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const minerSprite = new Image();
minerSprite.src = "minerador.png.png";
function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const player={
x:500,
y:500,
size:48,
angle:0,
mining:false,
walkTime:0,
speed:1.5
};

const camera={
x:0,
y:0
};

let level=1;
let xp=0;
let nextXp=100;
const inventory = {
coal:0,
iron:0,
gold:0
};
const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

const rocks=[];
const drops=[];
for(let i=0;i<12;i++){
const types=[
"coal",
"iron",
"gold"
];

const type=
types[
Math.floor(Math.random()*types.length)
];

rocks.push({
x:Math.random()*1800+100,
y:Math.random()*1800+100,
size:70,
type:type,
hp:type==="gold"?10:
type==="iron"?7:5,
maxHp:type==="gold"?10:
type==="iron"?7:5,
alive:true,
respawn:0
});

}

function gainXP(amount){

xp+=amount;

while(xp>=nextXp){

xp-=nextXp;

level++;

nextXp=Math.floor(nextXp*1.3);

floatText(
"LEVEL UP!",
window.innerWidth/2,
150
);

}

updateHUD();

}

function updateHUD(){

document.getElementById(
"level"
).innerText=level;

document.getElementById(
"xp"
).innerText=Math.floor(xp);

document.getElementById(
"nextXp"
).innerText=nextXp;

document.getElementById(
"xpFill"
).style.width=
(xp/nextXp*100)+"%";
document.getElementById(
"ores"
).innerHTML=
`⚫ ${inventory.coal}
 | ⚙ ${inventory.iron}
 | 🟡 ${inventory.gold}`;
}

function floatText(text,x,y){

const el=document.createElement("div");

el.className="float";

el.innerText=text;

el.style.left=x+"px";
el.style.top=y+"px";

document.body.appendChild(el);

setTimeout(()=>{
el.remove();
},1000);

}

function mineRock(){
player.mining=true;

setTimeout(()=>{

player.mining=false;

},150);
let nearest=null;
let dist=130;

for(const rock of rocks){

if(!rock.alive) continue;

const d=Math.hypot(
player.x-(rock.x+rock.size/2),
player.y-(rock.y+rock.size/2)
);

if(d<dist){

dist=d;
nearest=rock;

}

}
if(nearest){

nearest.hp--;

floatText(
"-1",
canvas.width/2+30,
canvas.height/2
);

if(nearest.hp<=0){
drops.push({

x:nearest.x,
y:nearest.y,

type:nearest.type

});
nearest.alive=false;

nearest.respawn=300;

gainXP(25);

floatText(
"+25 XP",
canvas.width/2,
canvas.height/2-40
);

}

}

}

document
.getElementById("mineBtn")
.addEventListener(
"click",
mineRock
);

let joyX=0;
let joyY=0;

const joystick=
document.getElementById("joystick");

const stick=
document.getElementById("stick");

let dragging=false;

joystick.addEventListener(
"touchstart",
()=>{
dragging=true;
}
);

window.addEventListener(
"touchend",
()=>{
dragging=false;

joyX=0;
joyY=0;

stick.style.left="40px";
stick.style.top="40px";
}
);

window.addEventListener(
"touchmove",
e=>{

if(!dragging) return;

const rect=
joystick.getBoundingClientRect();

const touch=
e.touches[0];

let x=
touch.clientX-
(rect.left+70);


let y=
touch.clientY-
(rect.top+70);

const len=
Math.hypot(x,y);

if(len>40){

x=x/len*40;
y=y/len*40;

}

joyX=x/40;
joyY=y/40;

stick.style.left=
(40+x)+"px";

stick.style.top=
(40+y)+"px";

}
);

function update(){

let moveX = 0;
let moveY = 0;

if(keys["w"]) moveY--;
if(keys["s"]) moveY++;
if(keys["a"]) moveX--;
if(keys["d"]) moveX++;

let length = Math.hypot(moveX, moveY);

if(length > 0){

moveX /= length;
moveY /= length;

player.x += moveX * player.speed;
player.y += moveY * player.speed;

}
if(
Math.abs(moveX)>0 ||
Math.abs(moveY)>0
){
player.walkTime+=0.2;
}

player.x+=joyX*player.speed;
player.y+=joyY*player.speed;

camera.x=
player.x-canvas.width/2;

camera.y=
player.y-canvas.height/2;

for(const rock of rocks){

if(!rock.alive){

rock.respawn--;

if(rock.respawn<=0){

rock.alive=true;
rock.hp=rock.maxHp;

}

}

}
for(let i=drops.length-1;i>=0;i--){

const drop=drops[i];

const d=Math.hypot(
player.x-drop.x,
player.y-drop.y
);

if(d<60){

if(drop.type==="coal"){
inventory.coal++;
}

if(drop.type==="iron"){
inventory.iron++;
}

if(drop.type==="gold"){
inventory.gold++;
}

drops.splice(i,1);

updateHUD();

}

}
}

function draw(){

ctx.clearRect(
0,0,
canvas.width,
canvas.height
);

ctx.fillStyle="#4b8b3b";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

// textura simples

for(let x=0;x<canvas.width;x+=40){

    for(let y=0;y<canvas.height;y+=40){

        ctx.fillStyle="rgba(255,255,255,0.03)";

        ctx.fillRect(
            x,
            y,
            2,
            2
        );

    }

}

for(const rock of rocks){

if(!rock.alive) continue;

const zoom = 1.5;

const sx=
(rock.x-camera.x)*zoom;

const sy=
(rock.y-camera.y)*zoom;
if(rock.type==="coal"){
ctx.fillStyle="#222";
}

if(rock.type==="iron"){
ctx.fillStyle="#888";
}

if(rock.type==="gold"){
ctx.fillStyle="#ffd700";
}


ctx.beginPath();

ctx.arc(
sx + rock.size/2,
sy + rock.size/2,
rock.size/2,
0,
Math.PI*2
);

ctx.fill();

ctx.fillStyle="#777";

ctx.beginPath();

ctx.arc(
sx + rock.size*0.35,
sy + rock.size*0.35,
rock.size*0.12,
0,
Math.PI*2
);

ctx.fill();

ctx.beginPath();

ctx.arc(
sx + rock.size*0.65,
sy + rock.size*0.55,
rock.size*0.10,
0,
Math.PI*2
);

ctx.fill();

ctx.fillStyle="red";

ctx.fillRect(
sx,
sy-8,
rock.size,
5
);

ctx.fillStyle="lime";

ctx.fillRect(
sx,
sy-8,
rock.size*
(rock.hp/rock.maxHp),
5
);

}
for(const drop of drops){

const dx=
drop.x-camera.x;

const dy=
drop.y-camera.y;

if(drop.type==="coal"){
ctx.fillStyle="#111";
}

if(drop.type==="iron"){
ctx.fillStyle="#ccc";
}

if(drop.type==="gold"){
ctx.fillStyle="#ffd700";
}

ctx.beginPath();

ctx.arc(
dx,
dy,
12,
0,
Math.PI*2
);

ctx.fill();

}
ctx.drawImage(
minerSprite,
canvas.width/2-32,
canvas.height/2-32,
64,
64
);

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

updateHUD();
loop();

</script>

</body>
</html>
