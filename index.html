<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Miner Empire V1</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
touch-action:none;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#111;
}

canvas{
display:block;
background:#2c5e2e;
}

#hud{
position:fixed;
top:10px;
left:10px;
right:10px;
background:rgba(0,0,0,.7);
padding:10px;
border-radius:12px;
color:white;
z-index:10;
}

#xpBar{
width:100%;
height:16px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-top:6px;
}

#xpFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff9800,#ffd54f);
}

#mineBtn{
position:fixed;
right:20px;
bottom:30px;
width:100px;
height:100px;
border:none;
border-radius:50%;
background:#ff9800;
font-size:18px;
font-weight:bold;
color:black;
z-index:20;
}

#mineBtn:active{
transform:scale(.95);
}

#joystick{
position:fixed;
left:20px;
bottom:20px;
width:120px;
height:120px;
background:rgba(255,255,255,.15);
border-radius:50%;
z-index:20;
}

#stick{
position:absolute;
width:50px;
height:50px;
left:35px;
top:35px;
border-radius:50%;
background:white;
}

.float{
position:fixed;
color:gold;
font-weight:bold;
pointer-events:none;
animation:float 1s linear forwards;
z-index:100;
}

@keyframes float{
from{
opacity:1;
transform:translateY(0);
}
to{
opacity:0;
transform:translateY(-60px);
}
}
</style>
</head>
<body>

<div id="hud">
<div>Nível <span id="level">1</span></div>
<div>XP <span id="xp">0</span>/<span id="nextXp">100</span></div>

<div id="xpBar">
<div id="xpFill"></div>
</div>
</div>

<canvas id="game"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="mineBtn">MINERAR</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const player={
x:500,
y:500,
size:32,
speed:3
};

const camera={
x:0,
y:0
};

let level=1;
let xp=0;
let nextXp=100;

const keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

const rocks=[];

for(let i=0;i<25;i++){

rocks.push({
x:Math.random()*1800+100,
y:Math.random()*1800+100,
size:40,
hp:5,
maxHp:5,
alive:true,
respawn:0
});

}

function gainXP(amount){

xp+=amount;

while(xp>=nextXp){

xp-=nextXp;

level++;

nextXp=Math.floor(nextXp*1.3);

floatText(
"LEVEL UP!",
window.innerWidth/2,
150
);

}

updateHUD();

}

function updateHUD(){

document.getElementById(
"level"
).innerText=level;

document.getElementById(
"xp"
).innerText=Math.floor(xp);

document.getElementById(
"nextXp"
).innerText=nextXp;

document.getElementById(
"xpFill"
).style.width=
(xp/nextXp*100)+"%";

}

function floatText(text,x,y){

const el=document.createElement("div");

el.className="float";

el.innerText=text;

el.style.left=x+"px";
el.style.top=y+"px";

document.body.appendChild(el);

setTimeout(()=>{
el.remove();
},1000);

}

function mineRock(){

let nearest=null;
let dist=70;

for(const rock of rocks){

if(!rock.alive) continue;

const d=Math.hypot(
player.x-rock.x,
player.y-rock.y
);

if(d<dist){

dist=d;
nearest=rock;

}

}

if(nearest){

nearest.hp--;

floatText(
"-1",
canvas.width/2+30,
canvas.height/2
);

if(nearest.hp<=0){

nearest.alive=false;

nearest.respawn=300;

gainXP(25);

floatText(
"+25 XP",
canvas.width/2,
canvas.height/2-40
);

}

}

}

document
.getElementById("mineBtn")
.addEventListener(
"click",
mineRock
);

let joyX=0;
let joyY=0;

const joystick=
document.getElementById("joystick");

const stick=
document.getElementById("stick");

let dragging=false;

joystick.addEventListener(
"touchstart",
()=>{
dragging=true;
}
);

window.addEventListener(
"touchend",
()=>{
dragging=false;

joyX=0;
joyY=0;

stick.style.left="35px";
stick.style.top="35px";
}
);

window.addEventListener(
"touchmove",
e=>{

if(!dragging) return;

const rect=
joystick.getBoundingClientRect();

const touch=
e.touches[0];

let x=
touch.clientX-
(rect.left+60);

let y=
touch.clientY-
(rect.top+60);

const len=
Math.hypot(x,y);

if(len>40){

x=x/len*40;
y=y/len*40;

}

joyX=x/40;
joyY=y/40;

stick.style.left=
(35+x)+"px";

stick.style.top=
(35+y)+"px";

}
);

function update(){

if(keys["w"]) player.y-=player.speed;
if(keys["s"]) player.y+=player.speed;
if(keys["a"]) player.x-=player.speed;
if(keys["d"]) player.x+=player.speed;

player.x+=joyX*player.speed;
player.y+=joyY*player.speed;

camera.x=
player.x-canvas.width/2;

camera.y=
player.y-canvas.height/2;

for(const rock of rocks){

if(!rock.alive){

rock.respawn--;

if(rock.respawn<=0){

rock.alive=true;
rock.hp=rock.maxHp;

}

}

}

}

function draw(){

ctx.clearRect(
0,0,
canvas.width,
canvas.height
);

ctx.fillStyle="#3f7d3f";

ctx.fillRect(
0,0,
canvas.width,
canvas.height
);

for(const rock of rocks){

if(!rock.alive) continue;

const sx=
rock.x-camera.x;

const sy=
rock.y-camera.y;

ctx.fillStyle="#8d8d8d";

ctx.fillRect(
sx,
sy,
rock.size,
rock.size
);

ctx.fillStyle="red";

ctx.fillRect(
sx,
sy-8,
rock.size,
5
);

ctx.fillStyle="lime";

ctx.fillRect(
sx,
sy-8,
rock.size*
(rock.hp/rock.maxHp),
5
);

}

ctx.fillStyle="#2196f3";

ctx.fillRect(
canvas.width/2-player.size/2,
canvas.height/2-player.size/2,
player.size,
player.size
);

}

function loop(){

update();
draw();

requestAnimationFrame(loop);

}

updateHUD();
loop();

</script>

</body>
</html>
